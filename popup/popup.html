<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="popup-controls.css" />
    <title>eBay Σummer</title>
  </head>
  <body>
    <!-- Shell chrome only. Every feature section is mounted into #col-1 / #col-2
         by popup.js from the sections each feature's popup.js registered, so a
         build that omits a feature's <script> lines below gets no markup for it. -->
    <div class="sticky-top">
      <header class="header">
        <h1>eBay Σummer</h1>
        <label class="switch switch--master"><span class="switch__label">Extension enabled</span><input type="checkbox" id="enabled" /><span class="switch__slider"></span></label>
      </header>
      <button type="button" id="reload-ebay" class="btn">↻ Reload all eBay tabs</button>
    </div>

    <div class="cols">
      <div class="col" id="col-1"></div>
      <div class="col" id="col-2"></div>
    </div>

    <div class="footer">
      <button type="button" id="reset-defaults" class="btn-mini btn-reset" title="Restore all settings to defaults">Reset defaults</button>
      <span class="version" id="version"></span>
    </div>

    <!-- Registry + helpers first, then each feature's settings schema, then the
         assembled defaults map, then each feature's popup component — the same
         seams the content bundle uses (see manifest.json). popup.js reads the
         results off globalThis.ES and names no feature itself. -->
    <script src="../src/core/registry.js"></script>
    <script src="../src/core/popup-registry.js"></script>
    <script src="../src/core/popup-dom.js"></script>
    <script src="../src/core/sanitize.js"></script>
    <script src="../src/notifications/sounds.js"></script>
    <script src="../src/calculator/schema.js"></script>
    <script src="../src/notifications/schema.js"></script>
    <script src="../src/core/defaults.js"></script>
    <script src="../src/calculator/popup.js"></script>
    <script src="../src/notifications/popup.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
