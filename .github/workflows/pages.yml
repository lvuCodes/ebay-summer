name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# The deploy job needs these to mint the Pages artifact and publish it.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; a newer push supersedes an in-flight run rather than
# racing it. In-progress runs finish so a half-published site is never served.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      # vite.config.js builds site/ into ../docs, so the artifact comes from docs/.
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
