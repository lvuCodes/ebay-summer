name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  extension-tests:
    name: Extension tests + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # The extension has no dependencies; the coverage floors in package.json fail the job when breached.
      - run: npm run test:coverage

  site-build:
    name: Site build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      # Gates the site's own coverage floors, declared in site/package.json.
      - run: npm run test:coverage
      - run: npm run build
